  <!-- INICIALIZAÇÃO -->
  <script>
    function inicializarAplicacao() {
      Store.inicializar();
      Auth.inicializar();
      UI.inicializar();
      MenuRenderer.renderizar();
      Navigation.inicializar();
      Router.inicializar();

      const idsConcluidos = Store.obterProgresso();
      if (idsConcluidos.length > 0) {
        MenuRenderer.aplicarProgresso(idsConcluidos);
      }

      EventBus.on('PROGRESS_CHANGED', (dados) => {
        MenuRenderer.aplicarProgresso(dados.concluidos);
      });

      const btnHamburger = document.getElementById('btn-hamburger');
      const sidebar = document.getElementById('sidebar');
      btnHamburger.addEventListener('click', () => {
        sidebar.classList.toggle('mobile-aberto');
      });
      document.addEventListener('click', (e) => {
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !btnHamburger.contains(e.target)) {
          sidebar.classList.remove('mobile-aberto');
        }
      });

      if (Store.state.usuario.logado) {
        UI.mostrarTelaCurso(Store.state.usuario);
      } else {
        UI.mostrarTelaLogin();
      }
    }

    document.addEventListener('DOMContentLoaded', inicializarAplicacao);
  </script>
